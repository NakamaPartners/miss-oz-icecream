kind = "web"
previewPath = "/"
title = "Miss Oz Ice Cream"
version = "1.0.0"
id = "artifacts/miss-oz"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22526

[services.development]
run = "pnpm --filter @workspace/miss-oz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/miss-oz", "run", "build" ]
serve = "static"
publicDir = "artifacts/miss-oz/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22526"
BASE_PATH = "/"
